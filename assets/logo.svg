<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="vapor" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e8943a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e84040" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#0d0d0d"/>

  <!-- Device body -->
  <rect x="88" y="120" width="80" height="90" rx="12" fill="url(#body)" stroke="#4a4a4a" stroke-width="2"/>

  <!-- Screen -->
  <rect x="100" y="135" width="56" height="30" rx="4" fill="#111"/>
  <text x="128" y="156" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#e8943a">185°</text>

  <!-- Heater indicator -->
  <circle cx="128" cy="185" r="6" fill="#e84040" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Vapor wisps -->
  <path d="M112 110 Q108 85 115 65" stroke="url(#vapor)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <animate attributeName="d" values="M112 110 Q108 85 115 65;M112 110 Q104 80 118 60;M112 110 Q108 85 115 65" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M128 105 Q132 75 125 55" stroke="url(#vapor)" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7">
    <animate attributeName="d" values="M128 105 Q132 75 125 55;M128 105 Q136 70 122 48;M128 105 Q132 75 125 55" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M144 110 Q148 88 140 68" stroke="url(#vapor)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5">
    <animate attributeName="d" values="M144 110 Q148 88 140 68;M144 110 Q152 82 138 62;M144 110 Q148 88 140 68" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- Title -->
  <text x="128" y="245" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#888" letter-spacing="4">FUMAR</text>
</svg>
